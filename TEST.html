<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image and Text Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .image-section {
            flex: 1;
            min-width: 0;
        }

        .image-section img {
            width: 100%;
            height: auto;
            display: block;
        }

        .text-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .text-section p {
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="your-image.jpg" alt="Description">
        </div>
        <div class="text-section">
            <p>Your text content goes here. This layout will stack on mobile devices.</p>
            <div class="buttons">
                <button>Button 1</button>
                <button>Button 2</button>
            </div>
        </div>
    </div>
</body>
</html>
